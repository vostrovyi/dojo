name: Run Newman tests

on:
    workflow_dispatch:

jobs:
    api-testing:
        timeout-minutes: 2
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 26.0.0
            - name: Install newman
              run: |
                  npm install -g newman
                  npm install -g newman-reporter-htmlextra
            - name: Run Newman tests
              run: newman run dojo_products.postman.json -d data.csv -r htmlextra
            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: newman-report
                  path: newman/
                  retention-days: 90
